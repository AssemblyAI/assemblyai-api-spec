imports:
  root: __package__.yml
types:
  StreamingEncoding:
    default: pcm_s16le
    docs: Encoding of the audio stream.
    enum:
      - pcm_s16le
      - pcm_mulaw
    source:
      openapi: ../usm-streaming.yml
  StreamingFormatTurns:
    default: "false"
    docs: Whether to return formatted final transcripts.
    enum:
      - "true"
      - "false"
    source:
      openapi: ../usm-streaming.yml
  StreamingLanguage:
    default: en
    docs: The language of your audio stream.
    enum:
      - en
      - multi
    source:
      openapi: ../usm-streaming.yml
  StreamingLanguageDetection:
    default: "false"
    docs: >-
      Whether to detect the language and return language metadata on utterances
      and final turns. Only available for the multilingual model.
    enum:
      - "true"
      - "false"
    source:
      openapi: ../usm-streaming.yml
  StreamingSpeechModel:
    docs: The speech model used for your Streaming session.
    enum:
      - name: UniversalStreamingEnglish
        value: universal-streaming-english
      - name: UniversalStreamingMultilingual
        value: universal-streaming-multilingual
      - name: WhisperRt
        value: whisper-rt
    source:
      openapi: ../usm-streaming.yml
channel:
  auth: false
  display-name: Universal-Streaming
  docs: >
    Stream audio and receive real-time transcription results. Fast,
    cost-effective streaming transcription available in three variants:
     - **Universal-Streaming English** — the fastest real-time English transcription
     - **Universal-Streaming Multilingual** — multilingual support (English, Spanish, German, French, Portuguese, and Italian) at the same speed and price
     - **Whisper-Streaming** — open-source Whisper powered by AssemblyAI's infrastructure with 99+ languages

    <Note> To use our EU server for Streaming STT, replace
    `streaming.assemblyai.com` with

    `streaming.eu.assemblyai.com`. </Note>
  examples:
    - headers: {}
      messages:
        - body:
            expires_at: 1745483367
            id: cfd280c7-5a9b-4dd6-8c05-235ccfa3c97f
            type: Begin
          type: receiveSessionBegins
        - body: Y3VyaW91cyBtaW5k
          type: sendAudio
        - body: cyB0aGluayBhbGlrZSA6KQ==
          type: sendAudio
      name: This is an example of a speech-to-text session
      query-parameters:
        sample_rate: 1
        speech_model: universal-streaming-english
  headers:
    Authorization:
      docs: >-
        Use your API key for authentication, or alternatively generate a
        [temporary
        token](/docs/api-reference/streaming-api/generate-streaming-token) and
        pass it via the `token` query parameter.
      name: authorization
      type: optional<string>
  messages:
    audioChunk:
      body:
        type: string
        validation:
          format: binary
      origin: client
    forceEndpoint:
      body: root.ForceEndpointPayload
      origin: client
    sessionBegins:
      body: root.SessionBeginsPayload
      origin: server
    sessionTermination:
      body: root.SessionTerminationPayload
      origin: client
    termination:
      body: root.TerminationPayload
      origin: server
    turn:
      body: root.TurnPayload
      origin: server
    updateConfiguration:
      body: root.UpdateConfigurationPayload
      origin: client
  path: /v3/ws
  path-parameters:
    filter_profanity: optional<string>
  query-parameters:
    encoding:
      default: pcm_s16le
      docs: Encoding of the audio stream.
      type: optional<StreamingEncoding>
    end_of_turn_confidence_threshold:
      availability: deprecated
      default: 0.4
      docs: >-
        The confidence threshold (0.0 to 1.0) to use when determining if the end
        of a turn has been reached. See [Turn
        Detection](https://www.assemblyai.com/docs/streaming/universal-streaming/turn-detection)
        for configuration details.
      type: optional<double>
    format_turns:
      default: "false"
      docs: Whether to return formatted final transcripts.
      type: optional<StreamingFormatTurns>
    inactivity_timeout:
      docs: >-
        Optional time in seconds of inactivity before session is terminated. If
        not set, no inactivity timeout is applied.
      type: optional<integer>
      validation:
        max: 3600
        min: 5
    keyterms_prompt:
      allow-multiple: true
      docs: >-
        A list of words and phrases to improve recognition accuracy for. See
        [Keyterms
        Prompting](https://www.assemblyai.com/docs/streaming/keyterms-prompting)
        for more details.
      type: optional<string>
    language:
      availability: deprecated
      default: en
      docs: The language of your audio stream.
      type: optional<StreamingLanguage>
    language_detection:
      default: "false"
      docs: >-
        Whether to detect the language and return language metadata on
        utterances and final turns. Only available for the multilingual model.
      type: optional<StreamingLanguageDetection>
    max_turn_silence:
      default: 1280
      docs: >-
        The maximum amount of silence in milliseconds allowed in a turn before
        end of turn is triggered. See [Turn
        Detection](https://www.assemblyai.com/docs/streaming/universal-streaming/turn-detection)
        for configuration details.
      type: optional<integer>
    min_turn_silence:
      default: 400
      docs: >-
        The minimum amount of silence in milliseconds required to detect end of
        turn when confident. See [Turn
        Detection](https://www.assemblyai.com/docs/streaming/universal-streaming/turn-detection)
        for configuration details.
      type: optional<integer>
    sample_rate:
      default: 16000
      docs: Sample rate of the audio stream.
      type: integer
    speech_model:
      docs: The speech model used for your Streaming session.
      type: StreamingSpeechModel
    token:
      docs: >-
        API token for authentication (if using a [temporary
        token](/docs/api-reference/streaming-api/generate-streaming-token)).
      type: optional<string>
    vad_threshold:
      default: 0.4
      docs: >-
        The confidence threshold (0.0 to 1.0) for classifying audio frames as
        silence. Frames with VAD confidence below this value are considered
        silent. Increase for noisy environments to reduce false speech
        detection.
      type: optional<double>
  url: production
