imports:
  root: __package__.yml
types:
  Encoding:
    default: pcm_s16le
    docs: Encoding of the audio stream.
    enum:
      - pcm_s16le
      - pcm_mulaw
    source:
      openapi: ../usm-streaming-u3-pro.yml
  LanguageDetection:
    default: "false"
    docs: >-
      Whether to return `language_code` and `language_confidence` in turn
      messages. Universal-3 Pro natively code-switches between English, Spanish,
      German, French, Portuguese, and Italian by default without any necessary
      configuration.
    enum:
      - "true"
      - "false"
    source:
      openapi: ../usm-streaming-u3-pro.yml
channel:
  auth: false
  display-name: Universal-3 Pro
  docs: >
    Stream audio and receive real-time transcription results using the
    Universal-3 Pro model. The most accurate streaming model for voice agents
    that demand the highest quality, with best-in-class accuracy and advanced
    prompting capabilities.


    Supports: English, Spanish, German, French, Portuguese, and Italian.


    <Note> To use our EU server for Streaming STT, replace
    `streaming.assemblyai.com` with

    `streaming.eu.assemblyai.com`. </Note>
  examples:
    - headers: {}
      messages:
        - body:
            expires_at: 1745483367
            id: cfd280c7-5a9b-4dd6-8c05-235ccfa3c97f
            type: Begin
          type: receiveSessionBegins
        - body: Y3VyaW91cyBtaW5k
          type: sendAudio
        - body: cyB0aGluayBhbGlrZSA6KQ==
          type: sendAudio
      name: This is an example of a speech-to-text session using Universal-3 Pro
      query-parameters:
        sample_rate: 1
        speech_model: u3-rt-pro
  headers:
    Authorization:
      docs: >-
        Use your API key for authentication, or alternatively generate a
        [temporary
        token](/docs/api-reference/universal-3-pro/generate-streaming-token) and
        pass it via the `token` query parameter.
      name: authorization
      type: optional<string>
  messages:
    audioChunk:
      body:
        type: string
        validation:
          format: binary
      origin: client
    forceEndpoint:
      body: root.ForceEndpointPayload
      origin: client
    sessionBegins:
      body: root.SessionBeginsPayload
      origin: server
    sessionTermination:
      body: root.SessionTerminationPayload
      origin: client
    speechStarted:
      body: root.SpeechStartedPayload
      origin: server
    termination:
      body: root.TerminationPayload
      origin: server
    turn:
      body: root.TurnPayload
      origin: server
    updateConfiguration:
      body: root.UpdateConfigurationPayload
      origin: client
  path: /v3/ws
  path-parameters:
    filter_profanity: optional<string>
  query-parameters:
    encoding:
      default: pcm_s16le
      docs: Encoding of the audio stream.
      type: optional<Encoding>
    inactivity_timeout:
      docs: >-
        Optional time in seconds of inactivity before session is terminated. If
        not set, no inactivity timeout is applied.
      type: optional<integer>
      validation:
        max: 3600
        min: 5
    keyterms_prompt:
      allow-multiple: true
      docs: >-
        A list of words and phrases to improve recognition accuracy for. See
        [Keyterms
        Prompting](https://www.assemblyai.com/docs/streaming/keyterms-prompting)
        for more details.
      type: optional<string>
    language_detection:
      default: "false"
      docs: >-
        Whether to return `language_code` and `language_confidence` in turn
        messages. Universal-3 Pro natively code-switches between English,
        Spanish, German, French, Portuguese, and Italian by default without any
        necessary configuration.
      type: optional<LanguageDetection>
    max_turn_silence:
      default: 1000
      docs: >-
        Maximum silence in milliseconds before the turn is forced to end,
        regardless of punctuation. See [Turn
        Detection](https://www.assemblyai.com/docs/streaming/turn-detection) for
        configuration details.
      type: optional<integer>
    min_turn_silence:
      default: 100
      docs: >-
        Silence duration in milliseconds before a speculative end-of-turn check.
        If terminal punctuation is found, the turn ends. Otherwise, a partial is
        emitted and the turn continues. See [Turn
        Detection](https://www.assemblyai.com/docs/streaming/turn-detection) for
        configuration details.
      type: optional<integer>
    prompt:
      docs: >-
        Prompting is a beta feature. Custom transcription instructions for the
        model. When not provided, a default prompt optimized for native turn
        detection is used automatically. See [Universal-3 Pro
        Streaming](https://www.assemblyai.com/docs/streaming/universal-3-pro)
        for prompting details.
      type: optional<string>
    sample_rate:
      default: 16000
      docs: Sample rate of the audio stream.
      type: integer
    speech_model:
      docs: The speech model to use.
      type: literal<"u3-rt-pro">
    token:
      docs: >-
        API token for authentication (if using a [temporary
        token](/docs/api-reference/streaming-api/generate-streaming-token)).
      type: optional<string>
    vad_threshold:
      default: 0.3
      docs: >-
        The confidence threshold (0.0 to 1.0) for classifying audio frames as
        silence. Frames with VAD confidence below this value are considered
        silent. Increase for noisy environments to reduce false speech
        detection.
      type: optional<double>
  url: production
