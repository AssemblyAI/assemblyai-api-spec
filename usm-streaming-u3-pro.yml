asyncapi: 3.0.0

info:
  title: AssemblyAI Universal-3 Pro Streaming WebSocket API
  version: 1.0.0
  description: |
    Real-time speech-to-text transcription API over WebSocket using the Universal-3 Pro model.
    Clients send audio data and configuration messages and receive transcription events.

servers:
  production:
    host: streaming.assemblyai.com
    protocol: wss
    description: Production WebSocket endpoint

channels:
  streamingU3Pro:
    address: /v3/ws
    description: |
      Stream audio and receive real-time transcription results using the Universal-3 Pro model. The most accurate streaming model for voice agents that demand the highest quality, with best-in-class accuracy and advanced prompting capabilities.
      
      Supports: English, Spanish, German, French, Portuguese, and Italian.

      <Note> To use our EU server for Streaming STT, replace `streaming.assemblyai.com` with
      `streaming.eu.assemblyai.com`. </Note>
    servers:
      - $ref: "#/servers/production"
    parameters:
      speech_model:
        description: The speech model to use.
        location: $message.payload#/speech_model
        enum:
          [
            "u3-rt-pro",
          ]

      ApiKey:
        description: >-
          Use your API key for authentication, or alternatively generate a [temporary token](/docs/api-reference/universal-3-pro/generate-streaming-token) and pass it via the `token` query parameter.
        location: $message.header#/Authorization
        examples:
          - token YOUR_ASSEMBLYAI_API_KEY

      encoding:
        description: Encoding of the audio stream.
        location: $message.payload#/encoding
        enum: ["pcm_s16le", "pcm_mulaw"]
        default: "pcm_s16le"

      inactivity_timeout:
        description: Optional time in seconds of inactivity before session is terminated. If not set, no inactivity timeout is applied.
        location: $message.payload#/inactivity_timeout
        schema:
          type: integer
          minimum: 5
          maximum: 3600
        examples:
          - 5
          - 3600
        default: None
        format: s

      keyterms_prompt:
        description: A list of words and phrases to improve recognition accuracy for.
        location: $message.payload#/keyterms_prompt
        schema:
          type: array
          items:
            x-label: Word
            type: string

      language_detection:
        description: Whether to return `language_code` and `language_confidence` in turn messages. Universal-3 Pro natively code-switches between English, Spanish, German, French, Portuguese, and Italian by default without any necessary configuration.
        location: $message.payload#/language_detection
        enum: ["true", "false"]
        default: "false"

      max_turn_silence:
        description: Maximum silence in milliseconds before the turn is forced to end, regardless of punctuation.
        location: $message.payload#/max_turn_silence
        schema:
          type: integer
          default: 1000
        examples:
          - 700
          - 1000

      min_turn_silence:
        description: Silence duration in milliseconds before a speculative end-of-turn check. If terminal punctuation is found, the turn ends. Otherwise, a partial is emitted and the turn continues.
        location: $message.payload#/min_turn_silence
        schema:
          type: integer
          default: 100
        examples:
          - 100
          - 200

      prompt:
        description: Prompting is a beta feature. Custom transcription instructions for the model. When not provided, a default prompt optimized for native turn detection is used automatically.
        location: $message.payload#/prompt
        schema:
          type: string

      sample_rate:
        description: Sample rate of the audio stream.
        location: $message.payload#/sample_rate
        schema:
          type: integer
          default: 16000
        examples: [16000, 48000]

      token:
        description: API token for authentication (if using a [temporary token](/docs/api-reference/streaming-api/generate-streaming-token)).
        location: $message.payload#/token

      vad_threshold:
        description: The confidence threshold (0.0 to 1.0) for classifying audio frames as silence. Frames with VAD confidence below this value are considered silent. Increase for noisy environments to reduce false speech detection.
        location: $message.payload#/vad_threshold
        schema:
          type: number
          default: 0.3
        default: 0.3

    messages:
      updateConfiguration:
        $ref: "#/components/messages/UpdateConfiguration"
      forceEndpoint:
        $ref: "#/components/messages/ForceEndpoint"
      sessionTermination:
        $ref: "#/components/messages/SessionTermination"
      audioChunk:
        $ref: "#/components/messages/AudioChunk"

      sessionBegins:
        $ref: "#/components/messages/SessionBegins"
      speechStarted:
        $ref: "#/components/messages/SpeechStarted"
      turn:
        $ref: "#/components/messages/Turn"
      termination:
        $ref: "#/components/messages/Termination"
operations:
  sendAudio:
    action: send
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/audioChunk"
    description: Send audio data chunks for transcription. The payload must be of type bytes and contain audio data between 50ms and 1000ms in length.

  sendUpdateConfiguration:
    action: send
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/updateConfiguration"
    description: Update streaming configuration parameters during an active session. You can update `prompt`, `keyterms_prompt`, `min_turn_silence`, and `max_turn_silence`.

  sendForceEndpoint:
    action: send
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/forceEndpoint"
    description: Manually force an endpoint in the transcription.

  sendSessionTermination:
    action: send
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/sessionTermination"
    description: Gracefully terminate the streaming session.

  receiveSessionBegins:
    action: receive
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/sessionBegins"
    description: Receive confirmation that the streaming session has successfully started.

  receiveSpeechStarted:
    action: receive
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/speechStarted"
    description: Receive a notification that speech has been detected in the audio stream.

  receiveTurn:
    action: receive
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/turn"
    description: Receive a formatted turn-based transcription result.

  receiveTermination:
    action: receive
    channel:
      $ref: "#/channels/streamingU3Pro"
    messages:
      - $ref: "#/channels/streamingU3Pro/messages/termination"
    description: Receive confirmation that the session has been terminated by the server.

components:
  messages:
    UpdateConfiguration:
      name: UpdateConfiguration
      title: Update Streaming Configuration
      summary: Client message to update streaming configuration parameters during an active session.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/UpdateConfigurationPayload"

    ForceEndpoint:
      name: ForceEndpoint
      title: Force Endpoint
      summary: Client message to manually force an endpoint in the transcription.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ForceEndpointPayload"
      examples:
        - payload:
            type: ForceEndpoint

    SessionTermination:
      name: SessionTermination
      title: Terminate Session (Client Initiated)
      summary: Client message to gracefully terminate the streaming session.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/SessionTerminationPayload"

    AudioChunk:
      name: AudioChunk
      title: Audio Data Chunk
      summary: Client sends audio data as raw binary.
      contentType: application/octet-stream
      payload:
        type: string
        format: binary
      examples:
        - payload: '\x10\x00\x20\x00\x30\x00\x40\x00\x30\x00\x20\x00\x10\x00\x00\x00\xf0\xff\xe0\xff\xd0\xff\xc0\xff'

    SessionBegins:
      name: SessionBegins
      title: Session Begins Confirmation
      summary: Server message indicating the streaming session has successfully started.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/SessionBeginsPayload"

    SpeechStarted:
      name: SpeechStarted
      title: Speech Started
      summary: Server message indicating that speech has been detected in the audio stream.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/SpeechStartedPayload"

    Turn:
      name: Turn
      title: Formatted Turn Result
      summary: Server message containing a formatted turn-based transcription result.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/TurnPayload"

    Termination:
      name: Termination
      title: Session Terminated (Server Confirmation)
      summary: Server message confirming session termination with session statistics.
      contentType: application/json
      payload:
        $ref: "#/components/schemas/TerminationPayload"

  schemas:
    UpdateConfigurationPayload:
      type: object
      properties:
        type:
          type: string
          const: UpdateConfiguration
        prompt:
          type: string
          nullable: true
          description: Prompting is a beta feature. Custom transcription instructions for the model.
        keyterms_prompt:
          type: array
          nullable: true
          items:
            type: string
          description: A list of words and phrases to boost recognition for.
        min_turn_silence:
          type: integer
          nullable: true
          description: Silence duration in milliseconds before a speculative end-of-turn check.
        max_turn_silence:
          type: integer
          nullable: true
          description: Maximum silence in milliseconds before the turn is forced to end, regardless of punctuation.
      required:
        - type

    ForceEndpointPayload:
      type: object
      properties:
        type:
          type: string
          const: ForceEndpoint
      required:
        - type

    SessionTerminationPayload:
      type: object
      properties:
        type:
          type: string
          const: Terminate
      required:
        - type

    SessionBeginsPayload:
      type: object
      properties:
        type:
          type: string
          const: Begin
          description: Identifies the type of the message.
        id:
          type: string
          format: uuid
          description: Unique identifier for the streaming session.
        expires_at:
          type: integer
          description: Unix timestamp indicating when the session will expire.
      required:
        - type
        - id
        - expires_at

    SpeechStartedPayload:
      type: object
      properties:
        type:
          type: string
          const: SpeechStarted
          description: Identifies the type of the message.
        timestamp:
          type: integer
          description: The timestamp in milliseconds when speech was detected, relative to the beginning of the audio stream.
          format: ms
      required:
        - type
        - timestamp

    Word:
      type: object
      properties:
        text:
          type: string
          description: The transcribed word.
        start:
          type: integer
          description: Start time in milliseconds relative to the beginning of the audio stream.
          format: ms
        end:
          type: integer
          description: End time in milliseconds relative to the beginning of the audio stream.
          format: ms
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score for the word (0.0 to 1.0).
        word_is_final:
          type: boolean
          description: Whether the word is final.
      required:
        - text
        - start
        - end
        - confidence
        - word_is_final

    TurnPayload:
      type: object
      properties:
        type:
          type: string
          const: Turn
        turn_order:
          type: integer
          description: Order of this turn in the conversation.
        turn_is_formatted:
          type: boolean
          description: Whether this turn has been formatted. For Universal-3 Pro, this always matches `end_of_turn`.
        end_of_turn:
          type: boolean
          description: Whether this marks the end of a turn.
        transcript:
          type: string
          description: Transcript of all finalized words in the turn.
        utterance:
          type: string
          description: Finalized transcript of the turn, populated only on end_of_turn messages. Empty string on all other Turn messages. Equivalent to transcript when populated.
        language_code:
          type: string
          description: The language of the turn. Only populated when language detection is enabled and an utterance is complete or turn is final.
        language_confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: The confidence score for the detected language, between 0 (low confidence) and 1 (high confidence). Only populated when language detection is enabled and an utterance is complete or turn is final.
        end_of_turn_confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: The confidence score that this is the end of a turn, between 0.0 (low confidence) and 1.0 (high confidence). For Universal-3 Pro, this is 1.0 when `end_of_turn` is true and 0.0 otherwise.
        words:
          type: array
          items:
            $ref: "#/components/schemas/Word"
          description: Array of word-level details for this turn.
      required:
        - type
        - turn_order
        - turn_is_formatted
        - end_of_turn
        - transcript
        - end_of_turn_confidence
        - words

    TerminationPayload:
      type: object
      properties:
        type:
          type: string
          const: Termination
          description: Indicates the session has been terminated.
        audio_duration_seconds:
          type: integer
          description: Duration of the audio in seconds.
        session_duration_seconds:
          type: integer
          description: Duration of the session in seconds.
      required:
        - type
        - audio_duration_seconds
        - session_duration_seconds
